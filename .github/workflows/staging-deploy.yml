name: Staging Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:staging-latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: ${{ secrets.STAGING_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger staging deploy
        run: |
          curl -X POST "${{ secrets.STAGING_DEPLOY_HOOK }}"
